<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Opening CodeSandbox...</title>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; }
    .loader { border: 4px solid #333; border-top: 4px solid #00E5FF; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-right: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h2>Loading Design Preview in CodeSandbox...</h2>
  <script>
    const codeAppJs = `
import React from 'react';
import './styles.css';

export default function App() {
  return (
    <div className="container">
      <div className="glass-card">
        <div className="card-header">
          <span className="badge">GOAL</span>
          <span className="time">10:00 AM</span>
        </div>
        <h2 className="title">Implement Premium Design</h2>
        <p className="description">Explore new glassmorphism aesthetics and smooth transitions.</p>
        <div className="progress-bar">
          <div className="progress-fill" style={{ width: '65%' }}></div>
        </div>
        <button className="action-btn">Complete Task</button>
      </div>
    </div>
  );
}
`;

    const codeStylesCss = `
* { box-sizing: border-box; }
body { margin: 0; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; }
.container { padding: 2rem; }

.glass-card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 32px;
  width: 380px;
  color: white;
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.glass-card:hover {
  transform: translateY(-8px);
  background: rgba(255, 255, 255, 0.05);
}

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.badge { background: rgba(0, 229, 255, 0.2); color: #00E5FF; padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; letter-spacing: 1px; }
.time { color: rgba(255, 255, 255, 0.5); font-size: 14px; }
.title { margin: 0 0 12px 0; font-size: 22px; font-weight: 500; letter-spacing: -0.5px; }
.description { color: rgba(255, 255, 255, 0.7); font-size: 15px; line-height: 1.5; margin-bottom: 24px; }

.progress-bar { height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #00E5FF, #0055FF); border-radius: 10px; transition: width 1s ease-out; }

.action-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: white; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255, 255, 255, 0.05); }
.action-btn:hover { background: white; color: black; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); transform: scale(1.02); }
.action-btn:active { transform: scale(0.98); }
`;

    const files = {
      "package.json": { content: JSON.stringify({ dependencies: { react: "^18.0.0", "react-dom": "^18.0.0" } }) },
      "App.js": { content: codeAppJs },
      "styles.css": { content: codeStylesCss },
      "index.js": { content: "import React from 'react'; import { createRoot } from 'react-dom/client'; import App from './App'; const root = createRoot(document.getElementById('root')); root.render(<App />);" },
      "index.html": { content: "<div id='root'></div>" }
    };

    const parameters = LZString.compressToBase64(JSON.stringify({ files }))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    
    // Auto-redirect to CodeSandbox
    setTimeout(() => {
      window.location.href = "https://codesandbox.io/api/v1/sandboxes/define?parameters=" + parameters;
    }, 1000);
  </script>
</body>
</html>
